services:
  app:
    build:
      context: ..
      dockerfile: ./dev/Dockerfile
    ports:
      - 8080:8080
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env

  db:
    image: postgres:13-alpine3.18
    restart: always
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]

    env_file:
      - ../.env
