services:
  app:
    build:
      context: ..
      dockerfile: ./dev/Dockerfile
    ports:
      - 8080:8080
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - ../.env

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - 8081:80
    depends_on:
      - app

  db:
    image: postgres:13-alpine3.18
    restart: always
    ports:
      - '5432:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d $${POSTGRES_DB} -U $${POSTGRES_USER}"]
    volumes:
      - ./db/initial.sql:/docker-entrypoint-initdb.d/initial.sql
    env_file:
      - ../.env
